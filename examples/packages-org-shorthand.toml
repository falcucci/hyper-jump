[defaults]
base_url = "https://github.com"
api_base_url = "https://api.github.com/repos"

[defaults.platform.macos]
aarch64 = "aarch64-apple-darwin"
x86_64 = "x86_64-apple-darwin"

[defaults.platform.linux]
x86_64 = "x86_64-unknown-linux-gnu"

[defaults.platform.windows]
x86_64 = "win64"

[defaults.ext]
macos = "tar.gz"
linux = "tar.gz"
windows = "zip"

[[org]]
name = "jj-vcs"

[[org.package]]
id = "jujutsu"
alias = "jj"
repo = "jj"
download_template = "{base}/{repo}/releases/download/{version}/jj-{version}-{platform}.{file_type}"

[org.package.platform.linux]
x86_64 = "x86_64-unknown-linux-musl"
